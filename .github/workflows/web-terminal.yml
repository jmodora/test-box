name: 1. Interactive Web Terminal

on:
  workflow_dispatch: # Allows you to manually trigger this anytime

jobs:
  run-terminal:
    runs-on: ubuntu-latest

    steps:
    - name: Download GoTTY and Cloudflared
      run: |
        # 1. Download GoTTY (Web Terminal Converter)
        curl -L -o gotty.tar.gz https://github.com/yudai/gotty/releases/download/v1.0.1/gotty_linux_amd64.tar.gz
        tar -xzvf gotty.tar.gz && chmod +x gotty
        
        # 2. Download Cloudflare Tunnel Agent
        curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/download/2026.6.1/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared.deb

    - name: Start Interactive Web Terminal
      run: |
        # 1. Start GoTTY in the background, mapping /bin/bash to local port 8080 with write permission (-w)
        nohup ./gotty -w -p 8080 /bin/bash > gotty.log 2>&1 &
        sleep 2
        
        # 2. Start Cloudflare Tunnel pointing to our GoTTY local server
        nohup cloudflared tunnel --url http://localhost:8080 > tunnel.log 2>&1 &
        sleep 8
        
        # 3. Extract and display the temporary trycloudflare.com URL in the logs
        echo "============================================="
        echo "🎉 YOUR EMPOWERED WEB TERMINAL IS READY!"
        echo "Copy and open the link below in your Mac browser:"
        grep -o 'https://[^ ]*\.trycloudflare.com' tunnel.log
        echo "============================================="
        
        # 4. Keep the Azure virtual machine alive for 6 hours (Max limit)
        sleep 21600
