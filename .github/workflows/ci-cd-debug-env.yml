name: ci-cd-debug-env
on: [workflow_dispatch]

permissions:
  contents: write

jobs:
  run-terminal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: set token to ENV config
        env:
          MY_SECRET_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${MY_SECRET_TOKEN}" > ./github_token.txt

      # 核心：直接下载官方纯净 Linux 二进制包，解压并前台运行
      - name: Download and Run Raw tmate
        run: |
          echo "=== 正在从官方 GitHub 下载纯净版 tmate ==="
          curl -L https://github.com/tmate-io/tmate/releases/download/2.4.0/tmate-2.4.0-static-linux-amd64.tar.xz -o tmate.tar.xz
          tar -xf tmate.tar.xz --strip-components=1
          
          echo "=== 正在启动 tmate 调试会话 ==="
          ./tmate -S /tmp/tmate.sock new-session -d
          ./tmate -S /tmp/tmate.sock wait tmate-ready

          SSH_DATA=$(./tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')
          DEBUG_KEY=${{ secrets.DEBUG_KEY }}
          echo $DEBUG_KEY
          KEY_DATA=$(echo "$SSH_DATA" | openssl aes-256-cbc -a -salt -pbkdf2 -pass pass:"$DEBUG_KEY")
          echo "debug_key:$KEY_DATA" > config.md

          # 配置 Git 并提交回仓库
          git config --global user.name "test-box-auto"
          git config --global user.email "test-box@test-box.com"
          git add config.md
          git commit -m "chore: update config [skip ci]"
          git push
          
      # 计时步骤（在您连入虚拟机输入 exit 退出 tmate 后，会自动走到这一步）
      - name: Keep Alive and Show Elapsed Time
        run: |
          echo "tmate has exited. Starting 5-hour continuous run..."
          for i in {1..300}; do
            uptime_seconds=$(awk '{print int($1)}' /proc/uptime)
            minutes=$((uptime_seconds / 60))
            echo "⚡ 虚拟机当前总共已开机工作时间: ${minutes} 分钟"
            sleep 60
          done
